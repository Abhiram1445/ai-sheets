<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sheets</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/css/pluginsCss.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/plugins.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/css/luckysheet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/assets/iconfont/iconfont.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; overflow: hidden; background: #0f0f1a; }

    .app { display: flex; height: 100vh; }

    /* ---- MAIN AREA ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Top bar */
    .header {
      height: 52px; background: #16162a; display: flex; align-items: center;
      padding: 0 20px; gap: 12px; border-bottom: 1px solid #2a2a4a;
    }
    .logo {
      display: flex; align-items: center; gap: 8px; font-weight: 700;
      font-size: 17px; color: #fff; letter-spacing: -0.3px;
    }
    .logo svg { width: 26px; height: 26px; }
    .header-actions { margin-left: auto; display: flex; gap: 6px; }
    .header-btn {
      height: 32px; padding: 0 14px; border-radius: 6px; border: 1px solid #2a2a4a;
      background: transparent; color: #aaa; font-size: 12px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      font-family: inherit; transition: all .15s;
    }
    .header-btn:hover { border-color: #4a4a6a; color: #fff; background: #1e1e3a; }
    .header-btn.primary { background: #00c896; color: #0a0a1a; border-color: #00c896; font-weight: 600; }
    .header-btn.primary:hover { background: #00ddb0; }
    .header-btn svg { width: 14px; height: 14px; }

    .sheet-wrap { flex: 1; position: relative; }
    #luckysheet { width: 100%; height: 100%; }

    /* ---- AI SIDEBAR ---- */
    .sidebar {
      width: 360px; background: #12122a; border-left: 1px solid #2a2a4a;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      height: 52px; display: flex; align-items: center; padding: 0 16px;
      gap: 8px; border-bottom: 1px solid #2a2a4a;
    }
    .sidebar-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #00c896; }
    .sidebar-header span { font-weight: 600; font-size: 14px; color: #fff; }
    .sidebar-header .badge {
      margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: #1e2a4a; color: #6aa0ff; font-weight: 500;
    }

    .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    .msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg.user {
      align-self: flex-end; background: #1a3a5c; color: #cde4ff;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start; background: #1e1e3a; color: #d0d0e0;
      border-bottom-left-radius: 4px;
    }
    .msg.error {
      align-self: flex-start; background: #3a1a1a; color: #ff8888;
      border-bottom-left-radius: 4px;
    }
    .msg.success {
      align-self: flex-start; background: #1a3a2a; color: #88ffbb;
      border-bottom-left-radius: 4px;
    }

    .welcome {
      text-align: center; padding: 40px 20px; color: #555;
    }
    .welcome h3 { color: #888; font-size: 15px; margin-bottom: 8px; }
    .welcome p { font-size: 12px; line-height: 1.6; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-top: 1px solid #2a2a4a; }
    .chip {
      padding: 5px 10px; border-radius: 14px; background: #1e1e3a; border: 1px solid #2a2a4a;
      color: #999; font-size: 11px; cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .chip:hover { border-color: #00c896; color: #00c896; }

    .input-area {
      padding: 12px 16px; border-top: 1px solid #2a2a4a;
      display: flex; gap: 8px;
    }
    .input-area input {
      flex: 1; height: 40px; padding: 0 14px; border-radius: 8px;
      border: 1px solid #2a2a4a; background: #0d0d1f; color: #fff;
      font-size: 13px; outline: none; font-family: inherit;
    }
    .input-area input:focus { border-color: #00c896; }
    .input-area input::placeholder { color: #444; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 8px; border: none;
      background: #00c896; color: #0a0a1a; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .send-btn:hover { background: #00ddb0; }
    .send-btn:disabled { background: #2a2a4a; color: #555; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .loading-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #00c896; animation: pulse 1s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: .2s; }
    .loading-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="main">
      <div class="header">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
          AI Sheets
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="clearAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
            Clear
          </button>
          <button class="header-btn" onclick="saveToLocal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
            Save
          </button>
          <button class="header-btn primary" onclick="downloadXLSX()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download .xlsx
          </button>
        </div>
      </div>
      <div class="sheet-wrap">
        <div id="luckysheet"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <div class="dot"></div>
        <span>AI Assistant</span>
        <div class="badge">Groq Llama 3.3</div>
      </div>
      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
          <h3>What can I help with?</h3>
          <p>Try: "Add columns Name, Email, Phone"<br>
             "Make header row dark blue with white text"<br>
             "Fill column A with random names"</p>
        </div>
      </div>
      <div class="chips">
        <button class="chip" onclick="quickSend(this)">Add column "Name"</button>
        <button class="chip" onclick="quickSend(this)">Make header blue bold</button>
        <button class="chip" onclick="quickSend(this)">Add 10 random rows</button>
        <button class="chip" onclick="quickSend(this)">Style alternating rows</button>
        <button class="chip" onclick="quickSend(this)">Add SUM formulas</button>
        <button class="chip" onclick="quickSend(this)">Add borders to table</button>
      </div>
      <div class="input-area">
        <input id="aiInput" type="text" placeholder="Ask AI to do anything with the sheet..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="sendCommand()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/js/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/luckysheet.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
